<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
    </filter>
    <radialGradient id="soft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#e8e8e6"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#soft)"/>
  <g filter="url(#grain)" opacity="0.4">
    <circle cx="200" cy="150" r="1.5" fill="#9ca3af"/>
    <circle cx="450" cy="320" r="1" fill="#9ca3af"/>
    <circle cx="700" cy="180" r="2" fill="#6b7280"/>
    <circle cx="1000" cy="400" r="1" fill="#9ca3af"/>
    <circle cx="1200" cy="250" r="1.5" fill="#6b7280"/>
    <circle cx="300" cy="600" r="1" fill="#9ca3af"/>
    <circle cx="550" cy="750" r="2" fill="#6b7280"/>
    <circle cx="900" cy="650" r="1" fill="#9ca3af"/>
    <circle cx="1300" cy="800" r="1.5" fill="#9ca3af"/>
  </g>
</svg>
