name: Weekly research scrape

on:
  workflow_dispatch:
  schedule:
    # Weekly on Mondays at 03:30 UTC
    - cron: "30 3 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Run scraper (PubMed)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPE_TAG_SLUGS: ${{ secrets.SCRAPE_TAG_SLUGS }}
        run: npm run scrape:pubmed

