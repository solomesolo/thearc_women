# Task 21 — LLM processing + label assignment (run hourly)
# Runs workers/article_processor.py: extraction → knowledge_articles → knowledge_content → labels → mark processed
name: Process articles (hourly)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # every hour at :00

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker deps
        run: |
          pip install -r workers/requirements.txt
          pip install -r services/requirements.txt

      - name: Run article processor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          cd "$GITHUB_WORKSPACE" && PYTHONPATH=. python -m workers.article_processor
